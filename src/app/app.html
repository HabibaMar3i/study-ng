<main class="main">
  <div class="content">
      <section class="example-card">
        <h2>Signal store example</h2>
        <p>This demo uses a small store-like class with a signal state and computed values.</p>
        <p>Count: <strong>{{ counter.count() }}</strong></p>
        <p>Double: <strong>{{ counter.double() }}</strong></p>
        <div class="counter-actions">
          <button type="button" (click)="counter.decrement()">-</button>
          <button type="button" (click)="counter.increment()">+</button>
          <button type="button" (click)="counter.reset()">Reset</button>
        </div>
      </section>
    </div>
<router-outlet />
